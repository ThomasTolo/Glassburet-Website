services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: glassburet-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_APPLICATION_NAME: glassburet
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:h2:mem:glassburetdb
      SPRING_DATASOURCE_DRIVERCLASSNAME: org.h2.Driver
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.H2Dialect
      SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: glassburet-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
