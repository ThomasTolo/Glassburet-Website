
spring.application.name=glassburet
server.port=8080

# Datasource: default to Postgres service configured in docker-compose, override via env vars
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://db:5432/glassburetdb}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVERCLASSNAME:org.postgresql.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

# JPA/Hibernate Configuration - use Flyway for schema migrations in production
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Upload limits
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB


# Static Resources Configuration
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.chain.enabled=true

# Logging
logging.level.root=INFO
logging.level.com.glassburet=DEBUG
